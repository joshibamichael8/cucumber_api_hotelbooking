statuscode\u003e\r\n    And Response should contain available rooms\r\n    And Available rooms list should not be empty\r\n\r\n    Examples:\r\n      | checkin    | checkout   | statuscode |\r\n      | 2026-07-17 | 2026-07-18 | 200        |#specific dates\r\n      | 2026-07-20 | 2026-07-21 | 200        |#single night stay\r\n      | 2026-12-15 | 2026-12-20 | 200        |#far future dates\r\n      | 2026-07-01 | 2026-08-05 | 200        |#extended period (more than 30 days)\r\n      | 2026-07-17 | 2026-07-17 | 200        |#same day check-in and check-out (accepted in this application)\r\n\r\n \r\n  # \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d NEGATIVE SCENARIOS \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\r\n\r\n  @api @negative @regression @RM_5\r\n  Scenario Outline: Check room availability with invalid date formats and ranges\r\n    When User requests to check room availability with checkin \"\u003ccheckin\u003e\" and checkout \"\u003ccheckout\u003e\"\r\n    Then API response status code of RM should be \u003cstatuscode\u003e\r\n    And Response should indicate invalid date range / date format\r\n\r\n    Examples:\r\n      | checkin      | checkout   | statuscode |\r\n      | 2025-07-25   | 2025-07-20 | 400        |#checkout before checkin date\r\n      | invalid-date | 2025-07-21 | 503        |#invalid date format\r\n      | 2020-01-01   | 2020-01-02 | 400        |#past dates\r\n\r\n#checkout before checkin date - \r\n#       This scenario is getting failed because the API is accepting checkout date \r\n#       before checkin date, which is not a valid case.\r\n\r\n\r\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:///D:/Joshiba/Kata_Cucumber_Project/api_hotel_booking/src/test/resources/features/checkRoomAvailability.feature","feature":{"location":{"line":2,"column":1},"tags":[{"l ssword | 200        |\r\n        \r\n# \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d POSITIVE FLOWS \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\r\n\r\n    @smoke @regression @positive @CreateBooking_1 @api\r\n    Scenario Outline: Create a booking with valid details\r\n\r\n        When User enters search criteria with checkin \"\u003ccheckin\u003e\" and checkout \"\u003ccheckout\u003e\"\r\n        And User creates a new booking with following details and submits the booking:\r\n            | firstname   | \u003cfirstname\u003e   |\r\n            | lastname    | \u003clastname\u003e    |\r\n            | email       | \u003cemail\u003e       |\r\n            | phone       | \u003cphone\u003e       |\r\n            | checkin     | \u003ccheckin\u003e     |\r\n            | checkout    | \u003ccheckout\u003e    |\r\n            | depositpaid | \u003cdepositpaid\u003e |\r\n        Then API response status code should be 201 for booking creation\r\n        And User should see booking confirmation page with booking ID displayed\r\n        And Booking should contain all submitted details\r\n    \r\n        Examples:\r\n            | firstname | lastname  | email               | phone         | checkin    | checkout   | depositpaid |\r\n            | Krishnan  | Krishnan  | suresh1@gmail.com   | 07358480685   | 2025-07-17 | 2025-07-18 | false       |\r\n            | John      | Doe       | john.doe@example.com| +44123456789  | 2025-08-01 | 2025-08-05 | true        |\r\n\r\n# \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d NEGATIVE FLOWS \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\r\n\r\n    @regression @negative @CreateBooking_2 @api\r\n    Scenario Outline: Attempt to create a booking with missing/invalid required fields\r\n\r\n        When User enters search criteria with checkin \"\u003ccheckin\u003e\" and checkout \"\u003ccheckout\u003e\"\r\n        And User attempts to create a new booking with missing required fields:\r\n            | firstname   | \u003cfirstname\u003e   |\r\n            | lastname    | \u003clastname\u003e    |\r\n            | email       | \u003cemail\u003e       |\r\n            | phone       | \u003cphone\u003e       |\r\n            | checkin     | \u003ccheckin\u003e     |\r\n            | checkout    | \u003ccheckout\u003e    |\r\n            | depositpaid | \u003cdepositpaid\u003e |\r\n        Then API response status code should be 400 for bad request\r\n        And User gets \"\u003cFieldError\u003e\" error message for missing or invalid input fields\r\n    \r\n        Examples:\r\n            | firstname | lastname  | email               | phone         | checkin    | checkout   | depositpaid  | FieldError                          |\r\n            |           | Doe       |john.doe@example.com | +44123456789  | 2025-08-01 | 2025-08-05 | false        | Firstname should not be blank       |\r\n            |John       |           |john.doe@example.com | +44123456789  | 2025-08-01 | 2025-08-05 | false        | Lastname should not be blank        |\r\n            |John       | Doe       |                     | +44123456789  | 2025-08-01 | 2025-08-05 | false        | must be a well-formed email address |\r\n            |John       | Doe       |john.doe@example.com |               | 2025-08-01 | 2025-08-05 | false        | must not be empty                   |\r\n            |John       | Doe       |john.doe@example.com | +232323       | 2025-08-01 | 2025-08-05 | false        | size must be between 11 and 21      |\r\n            |John       | Doe       |invalid-email        | +44123456789  | 2025-08-01 | 2025-08-05 | false        | must be a well-formed email address |\r\n        ","mediaType":"text/x.cucumbe  end-to-end flow for booking, updating it, and verifying the changes\r\n    So that I can ensure the entire booking process works seamlessly from start to finish\r\n  \r\n  Description: Comprehensive end-to-end test creating a booking, updating it, and verifying the changes. \r\n    This scenario simulates a real user journey through the hotel booking process, ensuring that all components of the system work together seamlessly. \r\n    The test covers authentication, room search, booking creation, booking update, and verification of updated details.\r\n\r\n  # \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d POSITIVE E2E FLOWS \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\r\n\r\n  @e2e @smoke @regression @positive @E2E_1 @api\r\n  Scenario Outline: Complete happy path - Search, Book, and Receive Confirmation\r\n    # Login and generate token  \r\n    When User authenticates as user credentials:\r\n      | username | password |\r\n      | admin    | password |\r\n    And User stores the authentication token\r\n    Then API response status code for E2E should be 200\r\n\r\n    # Search for available rooms with specific date range and Create a booking with valid details\r\n    When User enters search criteria with checkin \"\u003ccheckin\u003e\" and checkout \"\u003ccheckout\u003e\"\r\n    And User creates a new booking with following details and submits the booking:\r\n      | firstname   | \u003cfirstname\u003e   |\r\n      | lastname    | \u003clastname\u003e    |\r\n      | email       | \u003cemail\u003e       |\r\n      | phone       | \u003cphone\u003e       |\r\n      | checkin     | \u003ccheckin\u003e     |\r\n      | checkout    | \u003ccheckout\u003e    |\r\n      | depositpaid | \u003cdepositpaid\u003e |\r\n    Then API response status code should be 201 for booking creation\r\n    And User should see booking confirmation page with booking ID displayed\r\n\r\n    #Update the booking with new details and verify the update\r\n    When User attempts to update booking ID with following details:\r\n     | roomid | firstname | lastname | depositpaid | checkin    | checkout   |\r\n     | 6      | Josh      | Mick     | false       | 2026-03-11 | 2026-03-12 |\r\n    Then Booking update should be successful with status 200\r\n    And Updated booking details should be reflected in system\r\n\r\n    # Retrieve the updated booking details and verify the changes\r\n    When User retrieves booking details using stored booking ID via API\r\n    Then API response should contain updated booking details with status code 200\r\n\r\n    # Cancel the booking and verify cancellation\r\n    When User attempts to cancel booking with ID via API\r\n    Then Booking cancellation should be successful with status 200\r\n    And API response should return 404 when retrieving cancelled booking details\r\n\r\n\r\nExamples:\r\n      | firstname | lastname | email              | phone       | roomId | checkin    | checkout   |depositpaid|\r\n      | John      | Doe      | john@example.com   | 07358480685 | 1      | 2025-12-15 | 2025-12-18 |false      |\r\n      | Jane      | Smith    | jane@example.com   | 07358480686 | 2      | 2025-12-20 | 2025-12-25 |false      |\r\n      | Bob       | Johnson  | bob@example.com    | 07358480687 | 3      | 2025-12-10 | 2025-12-12 |false      |","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:///D:/Joshiba/Kata_Cucumber_Project/api_hotel_booking/src/test/resources/features/e2eHotelBooking.feature","feature":{"location":{"line":2,"column":1},"tags":[{"location":{"line":1,"column":1},"name":"@E2E","id":"66ea6acf-f525-43fa-aee3-be33b56ce35b"},{"location":{"line":1,"column":6},"name":"@HotelBookingAPI","id":"9356efc7-7116-48b5-9a85-91a231b90d39"}],"language":"en","keyword":"Feature","name":"End-to-End Booking System Flow - Shady Meadows B\u0026B ative cases to ensure the API functions correctly under various conditions.  \r\n\r\n@Background\r\n  Scenario Outline: User authentication with valid credentials\r\n    When User authenticates as user with username \"\u003cusername\u003e\" and password \"\u003cpassword\u003e\"\r\n    Then API response status code should be \u003cstatusCode\u003e\r\n    And Response should contain a valid authentication token\r\n\r\n    Examples:\r\n      | username | password | statusCode |\r\n      | admin    | password | 200        |\r\n  # \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d POSITIVE SCENARIOS \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\r\n\r\n  @smoke @api @regression @positive @RM_1\r\n  Scenario Outline: Get list of all available rooms\r\n    When User requests to get list of all rooms\r\n    Then API response status code of RM should be \u003cstatuscode\u003e\r\n    And Response should contain list of rooms\r\n    And Each room should have room details\r\n\r\n    Examples:\r\n      | statuscode |\r\n      | 200        |\r\n\r\n  @smoke @api @regression @positive @RM_2\r\n  Scenario Outline: Get room details by room ID\r\n    When User requests to get room details for roomid \"\u003croomid\u003e\"\r\n    Then API response status code of RM should be \u003cstatuscode\u003e\r\n    And Response should contain room information\r\n    And Room details should contain \"roomid\"\r\n\r\n    Examples:\r\n      | roomid | statuscode |\r\n      | 1      | 200        |\r\n\r\n# \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d NEGATIVE SCENARIOS \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\r\n\r\n  @negative @api @regression @RM_3\r\n  Scenario Outline: Get room details with invalid room ID\r\n    When User requests to get room details for roomid \"\u003croomid\u003e\"\r\n    Then API response status code of RM should be \u003cstatuscode\u003e\r\n    And Response should indicate room not found \"\u003cerrorMessage\u003e\"\r\n\r\n    Examples:\r\n      | roomid | statuscode | errorMessage         |\r\n      | 9999   | 503        | Service Unavailable  |\r\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:///D:/Joshiba/Kata_Cucumber_Project/api_hotel_booking/src/test/resources/features/getRoomDetails.feature","feature":{"location":{"line":2,"column":1},"tags":[{"location":{"line":1,"column":1},"name":"@RoomManagement","id":"51aa387f-2930-4c33-9e50-f4572564336a"},{"location":{"line":1,"column":17},"name":"@getRoomDetails","id":"54997053-0cbf-41a1-8514-56c8e0a18fd8"},{"location":{"line":1,"column":33},"name":"@HotelBookingAPI","id":"b65420dd-11a8-456c-9de3-fa76246ac220"}],"language":"en","keyword":"Feature","name":"Get Room Details API","description":"  As an user of the Hotel Booking API,\n  I want to retrieve details of rooms\n  So that I can manage room information effectively \n\n  Description:\n    This feature tests the Get Room Details API which allows users to retrieve information about rooms. \n    The scenarios cover both positive and negative cases to ensure the API functions correctly under various conditions.  ","children":[{"scenario":{"location":{"line":13,"column":3},"tags":[{"location":{"line":12,"column":1},"name":"@Background","id":"5692f541-0f06-40e7-984c-212e4aef7566"}],"keyword":"Scenario Outline","name":"User authentication with valid credentials","steps":[{"location":{"line":14,"column":5},"keyword":"When ","text":"User authenticates as user with username \"\u003cusername\u003e\" and password \"\u003cpassword\u003e\"","id":"d64b1d0f-b5ab-422c-9b3a-ea71ff4fa601"},{"location":{"line":15,"column":5},"keyword":"Then ","text":"API response status code should be \u003cstatusCode\u003e","id":"91d3b710- r\n  And Response should contain a valid authentication token\r\n  And Token should not be empty\r\n\r\nExamples:\r\n    | username | password | statusCode |\r\n    | admin    | password | 200        |\r\n\r\n# \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d NEGATIVE SCENARIOS \u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\u003d\r\n\r\n  @api @negative @regression @authReg2\r\n  Scenario Outline: User authentication with invalid credentials\r\n    When User authenticates as user with username \"\u003cusername\u003e\" and password \"\u003cpassword\u003e\"\r\n    Then API response status code should be \u003cstatusCode\u003e\r\n    And Response should indicate \"\u003cerrorMessage\u003e\"\r\n    And Response should not contain authentication token\r\n\r\n    Examples:\r\n      | username           | password        | statusCode | errorMessage         |\r\n      | admin              | wrongpassword   | 401        |  Invalid credentials |#wrong input\r\n      | invaliduser        | password        | 401        |  Invalid credentials |#wrong input\r\n      |                    | password        | 401        | Invalid credentials  |#missing input\r\n      | admin              |                 | 401        | Invalid credentials  |#missing input\r\n      |                    |                 | 401        | Invalid credentials  |#missing input\r\n      | admin\u0027 OR \u00271\u0027\u003d\u00271   | password        | 401        | Invalid credentials  |#SQL injection\r\n      | admin              | \u0027 OR \u00271\u0027\u003d\u00271     | 401        | Invalid credentials  |#SQL injection\r\n      | admin              | PASSWORD        | 401        | Invalid credentials  |#case sensitivity\r\n\r\n@api @negative @authReg3\r\n  Scenario Outline: Access protected resources without valid authentication\r\n    When User \"\u003caction\u003e\"\r\n    Then API response status code should be \u003cstatusCode\u003e\r\n    And Response should indicate \"\u003cerrorMessage\u003e\"\r\n\r\n   Examples:\r\n      | action                                              | statusCode | errorMessage              |\r\n       | requests booking report without authentication token | 401        | Authentication required   |\r\n     \r\n    @api @negative @authReg4\r\n      Scenario Outline: Verify token expiration time is set correctly\r\n        When User authenticates as user with username \"\u003cusername\u003e\" and password \"\u003cpassword\u003e\"\r\n        Then API response should contain token expiration time\r\n        And Token expiration should be in the future\r\n\r\n        Examples:\r\n          | username | password |\r\n          | admin    | password |\r\n","mediaType":"text/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:///D:/Joshiba/Kata_Cucumber_Project/api_hotel_booking/src/test/resources/features/login.feature","feature":{"location":{"line":2,"column":1},"tags":[{"location":{"line":1,"column":1},"name":"@Login","id":"68d4dce5-70ff-4f8c-a366-808da8399157"},{"location":{"line":1,"column":8},"name":"@HotelBookingAPI","id":"3c541c75-2af3-4d1e-8650-7dc0e440c8d2"}],"language":"en","keyword":"Feature","name":"Login to the Hotel Booking API -Shady Meadows B\u0026B API","description":"As a user of the Hotel Booking API, \nI want to be able to log in with valid credentials\nSo that I can access protected resources and perform authorized actions.\n\nDescription: Test suite for the user authentication functionality of the Hotel Booking API.","children":[{"scenario":{"location":{"line":13,"column":1},"tags":[{"location":{"line":12,"column":1},"name":"@api","id":"0faf46e3-c619-46d9-9175-ee2b00844fa6"},{"location":{"line":12,"column":6},"name":"@positive","id":"419daadf-f248-40c1-a067-1e9cdd20ad48"},{"location":{"line":12,"column":16},"name":"@regression","id":"710fca14-cf84-4d00-9afb-ac231592b1ee"}
