# Extent Reports Configuration for Cucumber

cucumber.plugin=com.aventstack.extentreports.cucumber.adapter.ExtentCucumberAdapter:

# Report path where all reports will be generated
extent.reporter.html.out=reports/cucumber-report/

# Report name
extent.reporter.html.report.name=Cucumber Test Automation Report

# Theme: standard or dark
extent.reporter.html.theme=standard

# Document configuration
extent.reporter.config.report.title=Automation Test Report
extent.reporter.config.report.author=QA Team
extent.reporter.config.report.projectname=Cucumber Selenium Framework

# Screenshot configuration
extent.reporter.html.open=true

# Logs configuration  
extent.reporter.logs.config.level=INFO
extent.reporter.logs.config.file=logs/test-log.log

extent.reporter.spark.start=true
extent.reporter.spark.config=config/extent-config.xml
extent.reporter.spark.out=target/SparkReport.html