# Application Configuration File
content.type=application/json
authorization=automationintesting.online

# Browser Configuration
browser=chrome
headless=false
implicity_wait=10
pageload_timeout=30
script_timeout=20

# Application URLs
base.url=https://automationintesting.online/
api.base.url=https://automationintesting.online/api
environment=qa

# Browser Window Size
window.width=1920
window.height=1080

# Extent Report Path
report.path=./reports/

# Retry Configuration
retry.count=2
retry.delay=1000

# Logging Configuration
log.level=INFO
log.path=./reports/logs/

# Parallel Execution
parallel.threads=1

# API Configuration  
api.timeout=5000
api.connection.timeout=5000

# Authentication
auth.enabled=true

# Proxy Settings (Optional)
proxy.enabled=false
proxy.host=
proxy.port=

# Report Format
report.format=html
report.screenshot.on.failure=true
report.screenshot.on.success=false