# Application Configuration File
content.type=application/json
authorization=automationintesting.online

# Browser Configuration
browser=chrome
headless=false
implicity_wait=10
pageload_timeout=30
script_timeout=20

# Application URLs
base.url=https://automationintesting.online/
api.base.url=https://automationintesting.online/api
environment=qa

# Browser Window Size
window.width=1920
window.height=1080

# Extent Report Path
report.path=./reports/

# Retry Configuration
retry.count=2
retry.delay=1000

# Logging Configuration
log.level=INFO
log.path=./reports/logs/